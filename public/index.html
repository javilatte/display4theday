<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>display4theday</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2312141b'/><text y='.9em' font-size='72' x='50%25' text-anchor='middle'>🌤️</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-panels">Saltar al contenido</a>

    <div class="bg-layer" id="bg-night" aria-hidden="true"></div>
    <div class="bg-layer" id="bg-dawn" aria-hidden="true"></div>
    <div class="bg-layer" id="bg-morning" aria-hidden="true"></div>
    <div class="bg-layer" id="bg-afternoon" aria-hidden="true"></div>
    <div class="bg-layer" id="bg-sunset" aria-hidden="true"></div>
    <div class="bg-layer" id="bg-evening" aria-hidden="true"></div>
    <div class="bg-noise" aria-hidden="true"></div>

    <header class="header" role="banner">
      <div class="greeting-block">
        <div class="greeting-row">
          <h1 class="greeting" id="greeting" aria-live="polite" aria-atomic="true">Buenos días</h1>
          <button class="page-refresh-btn" id="page-refresh-btn" aria-label="Actualizar página">
            <svg
              class="page-refresh-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
              <path d="M21 3v5h-5" />
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
              <path d="M3 21v-5h5" />
            </svg>
          </button>
        </div>
        <p class="date-line" id="date-line" aria-live="polite" aria-atomic="true"></p>
      </div>
      <form class="google-search" id="google-search" role="search" aria-label="Buscar en Google">
        <button type="submit" class="google-search-btn" aria-label="Buscar">
          <svg
            class="google-search-icon"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </button>
        <input
          type="search"
          class="google-search-input"
          id="google-search-input"
          placeholder="Buscar en Google…"
          autocomplete="off"
          aria-label="Búsqueda de Google"
        />
      </form>

      <div class="clock-block">
        <time
          class="clock"
          id="clock"
          aria-live="polite"
          aria-atomic="true"
          aria-label="Hora actual"
          >00:00</time
        >
      </div>
    </header>

    <!-- Barra de noticias -->
    <div class="news-bar" aria-label="Últimas noticias">
      <span class="news-bar-label" aria-hidden="true">RTVE</span>
      <div class="news-ticker-wrap" id="news-ticker-wrap">
        <div
          class="news-ticker"
          id="news-ticker"
          role="feed"
          aria-label="Titulares de noticias"
          aria-live="off"
        >
          <span class="news-loading">Cargando noticias…</span>
        </div>
      </div>
    </div>

    <main class="panels" id="main-panels">
      <!-- ① Tiempo ─────────────────────────────────────────────────── -->
      <section class="panel panel-weather" id="panel-weather" aria-label="Panel del tiempo">
        <div class="panel-body" id="weather-body">
          <div class="w-hero">
            <div class="weather-icon-wrap" id="w-icon-wrap" aria-hidden="true"></div>
            <span class="weather-temp" id="w-temp" aria-live="polite">--°</span>
          </div>
          <p class="weather-desc" id="w-desc" aria-live="polite">Cargando…</p>
          <div class="weather-meta" aria-live="polite">
            <span id="w-humidity" title="Humedad">💧 --%</span>
            <span id="w-wind" title="Viento">💨 -- km/h</span>
            <span id="w-high" title="Máxima">↑ --°</span>
            <span id="w-low" title="Mínima">↓ --°</span>
          </div>
          <div class="weather-hourly" id="w-hourly" aria-label="Previsión por horas"></div>
          <p class="weather-location" id="w-location" aria-live="polite"></p>
        </div>
      </section>

      <!-- ② Asistente IA ──────────────────────────────────────────── -->
      <section class="panel panel-ai" id="panel-ai" aria-label="Asistente">
        <div class="ai-body">
          <div class="ai-messages" id="ai-messages">
            <p class="ai-loading">Iniciando asistente…</p>
          </div>
          <div class="ai-input-row">
            <select class="ai-model-select" id="ai-model-select" aria-label="Modelo"></select>
            <input
              type="text"
              class="ai-input"
              id="ai-input"
              placeholder="Pregunta algo…"
              autocomplete="off"
            />
            <button class="ai-refresh-btn" id="ai-refresh-btn" aria-label="Nuevo resumen">
              <svg
                class="ai-refresh-icon"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                <path d="M21 3v5h-5" />
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                <path d="M3 21v-5h5" />
              </svg>
            </button>
            <button class="ai-send-btn" id="ai-send-btn" aria-label="Enviar">
              <svg
                class="ai-send-icon"
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
        </div>
      </section>

      <!-- ③ Calendario ─────────────────────────────────────────────── -->
      <section class="panel panel-calendar" id="panel-calendar" aria-label="Calendario">
        <div class="panel-body" id="cal-body">
          <div class="cal-loading" id="cal-loading">
            <p>Cargando calendario…</p>
          </div>
        </div>
      </section>

      <!-- ③ Media (YouTube / iframe) ──────────────────────────────── -->
      <section
        class="panel panel-media"
        id="panel-media"
        aria-label="Reproductor multimedia"
      ></section>

      <!-- ④ Lista de tareas ────────────────────────────────────────── -->
      <section class="panel panel-todo" id="panel-todo" aria-label="Lista de tareas">
        <div class="panel-body todo-body">
          <ul class="todo-list" id="todo-list" aria-label="Tareas"></ul>
          <form class="todo-form" id="todo-form" aria-label="Añadir tarea">
            <input
              type="text"
              class="todo-input"
              id="todo-input"
              placeholder="Añadir tarea…"
              aria-label="Nueva tarea"
              autocomplete="off"
              maxlength="80"
            />
            <button type="submit" class="todo-add-btn" aria-label="Añadir">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
          </form>
        </div>
      </section>
    </main>

    <script src="lib/gsap.min.js"></script>
    <script src="lib/TextPlugin.min.js"></script>
    <script src="ui.js"></script>
    <script src="/d4td-config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
